# ================================================================
# nestandart.online — мультирыночный сайт
# VPS: 77.42.93.187
#
# Структура URL:
#   nestandart.online/         → 301 → /phuket/
#   nestandart.online/phuket/  → Пхукет (те же файлы, JS детектит)
#   nestandart.online/pattaya/ → Паттайя (те же файлы, JS детектит)
#
# Файлы сайта берём из того же каталога что и nestandart-phuket.ru
# Деплой: см. инструкцию ниже
# ================================================================

# HTTP → HTTPS
server {
    listen 80;
    server_name nestandart.online www.nestandart.online;
    return 301 https://nestandart.online$request_uri;
}

# Редирект www → без www
server {
    listen 443 ssl;
    server_name www.nestandart.online;
    ssl_certificate     /etc/letsencrypt/live/nestandart.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nestandart.online/privkey.pem;
    return 301 https://nestandart.online$request_uri;
}

# Основной
server {
    listen 443 ssl;
    server_name nestandart.online;

    ssl_certificate     /etc/letsencrypt/live/nestandart.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nestandart.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Файлы сайта — тот же каталог что и старый сайт
    root /var/www/nestandart-phuket.ru;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Корень → редирект на /phuket/
    location = / {
        return 301 https://nestandart.online/phuket/;
    }

    # /phuket или /pattaya без слеша → добавить слеш
    location ~ ^/(phuket|pattaya)$ {
        return 301 /$1/;
    }

    # Рынки: /phuket/... и /pattaya/...
    # Убираем префикс рынка, ищем файл от корня сайта
    location ~ ^/(phuket|pattaya)/(.+)$ {
        try_files /$2 /$2/ /index.html;
    }

    # Индексная страница рынка: /phuket/ и /pattaya/
    location ~ ^/(phuket|pattaya)/$ {
        try_files /index.html =404;
    }

    # Leads API (тот же pm2, порт 3055)
    location /api/leads {
        proxy_pass http://localhost:3055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Бэкенд FastAPI (Docker, порт 8000)
    location /api/v1/ {
        proxy_pass http://localhost:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Кэш статики
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
