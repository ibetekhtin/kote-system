# HQ (админка) на nestandart.online/hq/ — вставить внутрь server { } для nestandart.online.
# SPA: все пути под /hq/ отдают index.html (роутинг на клиенте). Данные защищены RLS (is_admin).

location /hq/ {
    alias /var/www/nestandart/hq/;
    try_files $uri $uri/ /hq/index.html;

    # лёгкая защита от индексации админки
    add_header X-Robots-Tag "noindex, nofollow" always;
}
