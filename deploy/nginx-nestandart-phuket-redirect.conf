# ================================================================
# nestandart-phuket.ru — редирект на новый домен
#
# API (порт 3055) и FastAPI (порт 8000) остаются работать —
# только веб-страницы редиректим на nestandart.online/phuket/
#
# Деплой: заменить /etc/nginx/sites-available/nestandart-phuket.ru
# ================================================================

# HTTP
server {
    listen 80;
    server_name nestandart-phuket.ru www.nestandart-phuket.ru;

    # API и webhook — НЕ редиректим
    location /api/ {
        proxy_pass http://localhost:3055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное → HTTPS нового домена
    location / {
        return 301 https://nestandart.online/phuket$request_uri;
    }
}

# HTTPS (сертификат ещё действует, используем его)
server {
    listen 443 ssl;
    server_name nestandart-phuket.ru www.nestandart-phuket.ru;

    ssl_certificate     /etc/letsencrypt/live/nestandart-phuket.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nestandart-phuket.ru/privkey.pem;

    # API — НЕ редиректим
    location /api/ {
        proxy_pass http://localhost:3055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное → новый домен
    location / {
        return 301 https://nestandart.online/phuket$request_uri;
    }
}
